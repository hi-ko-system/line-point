<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>포인트 관리자</title>

<link rel="stylesheet" href="admin.css?v=2">

</head>


<body>


<div class="admin-container">


<h1>
포인트 관리자
</h1>



<div id="loginBox" class="card">


<h3>관리자 로그인</h3>


<input
id="password"
type="password"
placeholder="비밀번호">


<button onclick="login()">
로그인
</button>


</div>





<div id="adminBox" style="display:none;">



<div class="card">


<h3>학생 선택</h3>



<input
id="search"
placeholder="학생 이름 검색"
oninput="searchStudent()">



<div id="searchResult"></div>





<select id="studentSelect">

<option>
학생을 선택하세요
</option>

</select>


</div>







<div class="card point-card">


<div class="small-title">
선택 학생
</div>


<div id="selectedName">
없음
</div>



<div class="small-title">
현재 포인트
</div>


<div class="point-number">

<span id="currentPoint">
0
</span>

P

</div>

<div id="studentDetail" class="card">

학생을 선택하세요.

</div>

</div>








<div class="card">


<h3>처리 종류</h3>



<div class="type-buttons">


<button
id="chargeBtn"
onclick="selectType('충전')">

+ 충전

</button>



<button
id="useBtn"
onclick="selectType('사용')">

- 사용

</button>


</div>



<input
type="hidden"
id="type"
value="충전">





<h3>금액</h3>


<input
id="amount"
type="number"
placeholder="금액 입력">





<h3>내용</h3>


<input
id="memo"
placeholder="내용 입력">





<button
class="save-button"
onclick="save()">

저장

</button>



<div id="result"></div>

<div class="card">

<h3>
최근 처리 내역
</h3>


<div id="history">

불러오는 중...

</div>


</div>

</div>



</div>


</div>





<script src="admin.js?v=5"></script>


</body>


</html>
