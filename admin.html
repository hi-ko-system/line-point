<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>포인트 관리자</title>

<link rel="stylesheet" href="style.css?v=9">

<style>

#adminBox,
#adminBox * {

    color:#222 !important;

}


#adminBox {

    background:white;

}


#adminBox input,
#adminBox select {

    background:white !important;

    color:#222 !important;

    border:1px solid #ccc;

}


#adminBox option {

    background:white !important;

    color:#222 !important;

}


#selectedName {

    display:inline-block;

    color:#111 !important;

    background:white !important;

    font-size:24px;

    font-weight:bold;

}


#currentPoint {

    display:inline-block;

    color:#16a34a !important;

    background:white !important;

    font-size:30px;

    font-weight:bold;

}



#searchResult div {

    background:white !important;

    color:#222 !important;

}



#searchResult div:hover {

    background:#eeeeee !important;

}


</style>


  
</head>


<body>


<div class="container">


<h1>포인트 관리</h1>



<div id="loginBox">


<h3>관리자 로그인</h3>


<input
id="password"
type="password"
placeholder="비밀번호">


<button onclick="login()">
로그인
</button>


</div>






<div id="adminBox" style="display:none;">



<h3>학생 선택</h3>



<!-- 검색 -->

<input
id="search"
placeholder="이름 검색"
oninput="searchStudent()">



<div id="searchResult"></div>





<!-- 전체 선택 -->

<select id="studentSelect">

<option>
학생을 선택하세요
</option>

</select>






<div class="point">


선택 학생

<br>

<span id="selectedName">
없음
</span>


<br><br>


현재 잔액

<br>

<span id="currentPoint">
0
</span>

P


</div>







<h3>구분</h3>


<select id="type">


<option value="충전">
충전
</option>


<option value="사용">
사용
</option>


</select>






<h3>금액</h3>


<input
id="amount"
type="number"
placeholder="금액 입력">





<h3>내용</h3>


<input
id="memo"
placeholder="내용 입력">





<button onclick="save()">
저장
</button>




<div id="result"></div>




</div>


</div>




<script src="admin.js?v=4"></script>


</body>


</html>
